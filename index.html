<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <title><%= appTitle %></title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- head partial start -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root { --bg:#f5f5f7; --card:#ffffff; --text:#1d1d1f; --muted:#6e6e73; --primary:#007aff; --radius:12px; }
      html, body { height: 100%; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>
    <!-- head partial end -->
  </head>
  <body>
    <main>
      <div id="app"></div>
    </main>
    <!-- footer partial start -->
    <footer style="text-align:center;padding:24px;color:var(--muted);font-size:12px;">
      © <script>document.write(new Date().getFullYear())</script> Apple Admin. All rights reserved.
    </footer>
    <!-- footer partial end -->
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
